services:
  mysql:
    image: mysql:8.0
    container_name: hailong-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    env_file:
      - .runtime/secrets.env
    environment:
      MYSQL_DATABASE: hailong_consulting
      MYSQL_USER: hailong_app
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./SQL:/docker-entrypoint-initdb.d:ro
    networks:
      - hailong-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  # 初始化公告数据容器
  init-announcements:
    image: mysql:8.0
    container_name: hailong-init-announcements
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .runtime/secrets.env
    volumes:
      - ./SQL:/sql:ro
    entrypoint: >
      sh -c '
        echo "等待 MySQL 就绪..."
        until mysqladmin ping -h mysql -u root -p$$MYSQL_ROOT_PASSWORD --silent; do
          sleep 2
        done
        echo "检查公告数据..."
        COUNT=$$(mysql -h mysql -u hailong_app -p$$MYSQL_PASSWORD -e "SELECT COUNT(*) FROM hailong_consulting.announcements" -s -N 2>/dev/null || echo 0)
        echo "当前公告数量: $$COUNT"
        if [ "$$COUNT" -lt 100 ]; then
          echo "导入招标公告..."
          mysql -h mysql -u hailong_app -p$$MYSQL_PASSWORD hailong_consulting < /sql/07_announcements_bidding.sql
          echo "导入中标公告..."
          mysql -h mysql -u hailong_app -p$$MYSQL_PASSWORD hailong_consulting < /sql/08_announcements_result.sql
          echo "导入变更公告..."
          mysql -h mysql -u hailong_app -p$$MYSQL_PASSWORD hailong_consulting < /sql/09_announcements_correction.sql
          COUNT=$$(mysql -h mysql -u hailong_app -p$$MYSQL_PASSWORD -e "SELECT COUNT(*) FROM hailong_consulting.announcements" -s -N 2>/dev/null)
          echo "导入完成，公告数量: $$COUNT"
        else
          echo "公告数据已存在，跳过导入"
        fi
        echo "初始化完成"
      '
    networks:
      - hailong-network
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  api:
    build:
      context: ./BackEnd/HailongConsulting.API
      dockerfile: Dockerfile
    container_name: hailong-api
    restart: unless-stopped
    env_file:
      - .runtime/secrets.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      Jwt__Issuer: HailongConsulting.API
      Jwt__Audience: HailongConsulting.Client
      Jwt__ExpireHours: 24
      ReverseProxy__TrustedProxy: 172.30.0.10
      ReverseProxy__HttpsRedirectEnabled: "false"
      TZ: Asia/Shanghai
    volumes:
      - api-uploads:/app/wwwroot/uploads
      - api-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hailong-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: hailong-nginx:local
    container_name: hailong-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - api-uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      hailong-network:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

networks:
  hailong-network:
    driver: bridge
    name: hailong-network
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  mysql-data:
    driver: local
  api-uploads:
    driver: local
  api-logs:
    driver: local
